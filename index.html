<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section id="todo">
        <section class="todoSidebar">
            <div class="todologo">
                <div class="devtodo">
                    <img src="Untitled design.png" alt="todologo" width="60rem" height="60rem">
                    <div>
                        <p>DevTodo</p>
                        <span>Stay Productive</span>
                    </div>
                </div>


                <div class="taskstatus">
                    <div class="alltask task">
                        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none"
                            stroke="#4725dd" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                            <rect width="7" height="7" x="3" y="3" rx="1" />
                            <rect width="7" height="7" x="14" y="3" rx="1" />
                            <rect width="7" height="7" x="14" y="14" rx="1" />
                            <rect width="7" height="7" x="3" y="14" rx="1" />
                        </svg>
                        <p>All task</p>
                        <div class="all taskcounter">0</div>
                    </div>

                    <div class="pendingtask task">
                        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none"
                            stroke="#f2880f" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-clock-icon lucide-clock">
                            <circle cx="12" cy="12" r="10" />
                            <path d="M12 6v6l4 2" />
                        </svg>
                        <p>Pending</p>
                        <div class="pending   taskcounter">0</div>
                    </div>
                    <div class="completetask task">
                        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none"
                            stroke="#0b8e25" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-circle-check-big-icon lucide-circle-check-big">
                            <path d="M21.801 10A10 10 0 1 1 17 3.335" />
                            <path d="m9 11 3 3L22 4" />
                        </svg>
                        <p>Complete</p>
                        <div class="complete taskcounter">0</div>
                    </div>

                    <div class="todaystask task">
                        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none"
                            stroke="#0b6edb" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-calendar-range-icon lucide-calendar-range">
                            <rect width="18" height="18" x="3" y="4" rx="2" />
                            <path d="M16 2v4" />
                            <path d="M3 10h18" />
                            <path d="M8 2v4" />
                            <path d="M17 14h-6" />
                            <path d="M13 18H7" />
                            <path d="M7 14h.01" />
                            <path d="M17 18h.01" />
                        </svg>
                        <p>Today</p>
                        <div class="today taskcounter">0</div>
                    </div>
                    <div class="overduetask task">
                        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none"
                            stroke="#e42b35" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-triangle-alert-icon lucide-triangle-alert">
                            <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3" />
                            <path d="M12 9v4" />
                            <path d="M12 17h.01" />
                        </svg>
                        <p>Overdue</p>
                        <div class="Overdue taskcounter">0</div>
                    </div>
                </div>
                <div class="quickactions">
                    <p class="actiontext">Quick actions</p>
                    <div class="trash">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="#0891B2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-trash2-icon lucide-trash-2">
                            <path d="M10 11v6" />
                            <path d="M14 11v6" />
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
                            <path d="M3 6h18" />
                            <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                        </svg>
                        <p>Trash</p>
                    </div>
                    <div class="clearcompleted trash">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="#E3256B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-copy-x-icon lucide-copy-x">
                            <line x1="12" x2="18" y1="12" y2="18" />
                            <line x1="12" x2="18" y1="18" y2="12" />
                            <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
                            <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
                        </svg>
                        <p>Clear completed</p>
                    </div>
                </div>
            </div>
            <div class="progresstracker">
                <div class="trackerheading">Progress</div>
                <div class="taskcompleteion"><span class="trackercompletedtask">0</span> out <span
                        class="trackertotaltask">0</span> task completed
                </div>
                <div class="progressbardisplay">
                    <div class="progressbar">
                        <div class="progressfill"></div>
                    </div>
                    <div class="progresspercentage">0%</div>
                </div>
            </div>
        </section>

        <section id="todoContainer">
            <div class="todotype">
                <div class="iconbox">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
                        fill="rgba(11,110,195,1)">
                        <path
                            d="M8 4H21V6H8V4ZM3 3.5H6V6.5H3V3.5ZM3 10.5H6V13.5H3V10.5ZM3 17.5H6V20.5H3V17.5ZM8 11H21V13H8V11ZM8 18H21V20H8V18Z">
                        </path>
                    </svg>
                </div>
                <div>
                    <p class="typeselection">
                        All Tasks
                    </p>
                    <span>Manage your task and boost your Productivity</span>
                </div>
            </div>
            <div id="addtaskSection">
                <input type="text" id="todoInput" placeholder="What do you want to do?">
                <input type="date" id="todotimePicker">
                <button id="addtaskButton">Add Task</button>
            </div>
            <div class="searchsection">
                <input type="text" id="todosearchbar" placeholder="🔍 Search Task">
                <div class="modechanger">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                        stroke="#686E7E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-moon-icon lucide-moon">
                        <path
                            d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401" />
                    </svg>
                    <div class="modebuttoncontainer">
                        <div class="modebutton">
                        </div>
                    </div>
                </div>
            </div>
            <ul id="taskSection">
            </ul>
        </section>
    </section>
    <div class="overlay"></div>

    <script src="script.js"></script>
</body>

</html>
